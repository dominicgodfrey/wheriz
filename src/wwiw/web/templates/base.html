<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Where Was I When{% endblock %}</title>
  <style>
    :root {
      --bg: #faf7f2; --card: #fff; --ink: #2c2a27; --muted: #6f6a63;
      --accent: #b5763a; --accent-ink: #fff; --line: #e7e1d8; --warn: #8a5a2b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    header {
      padding: 14px 20px; border-bottom: 1px solid var(--line);
      background: var(--card);
    }
    header a { font-weight: 600; color: var(--ink); text-decoration: none; letter-spacing: .02em; }
    main { max-width: 680px; margin: 0 auto; padding: 28px 20px 60px; }
    h1 { font-size: 1.5rem; margin: 0 0 .4em; }
    h2 { font-size: 1.15rem; margin: 1.4em 0 .5em; }
    p { margin: .5em 0; }
    .muted { color: var(--muted); }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 20px; margin: 18px 0;
    }
    label { display: block; font-weight: 600; margin: 14px 0 6px; }
    textarea, input[type=text] {
      width: 100%; padding: 10px 12px; border: 1px solid var(--line);
      border-radius: 8px; font: inherit; background: #fffdfa;
    }
    textarea { min-height: 120px; resize: vertical; }
    .btn {
      display: inline-block; background: var(--accent); color: var(--accent-ink);
      border: 0; border-radius: 8px; padding: 11px 18px; font: inherit; font-weight: 600;
      cursor: pointer; text-decoration: none;
    }
    .btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .steps { display: flex; gap: 10px; list-style: none; padding: 0; margin: 0 0 8px; font-size: .85rem; }
    .steps li { color: var(--muted); }
    .steps li.active { color: var(--accent); font-weight: 600; }
    .steps li.done::before { content: "✓ "; color: var(--accent); }
    ul.surfaces, ul.items { list-style: none; padding: 0; }
    ul.surfaces li, ul.items li { padding: 6px 0; border-bottom: 1px solid var(--line); }
    .check { display: flex; align-items: center; gap: 10px; font-weight: 400; }
    .notice { background: #fbf2e7; border: 1px solid #ecd9bf; color: var(--warn);
      border-radius: 8px; padding: 12px 14px; margin: 14px 0; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <header><a href="/">Where Was I When</a></header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
